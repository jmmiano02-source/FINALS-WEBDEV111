    <div class="main">
        <div class="header">
            <h2>Book a Table</h2>
        </div>
        <div class="panel">
            <h3>New Reservation</h3>
            <p style="color: var(--text-muted); margin: 15px 0;">Select an available slot below.</p>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <div class="card" style="cursor:pointer; border-color: var(--accent-green);">10:00 AM</div>
                <div class="card" style="cursor:pointer;">02:00 PM</div>
                <div class="card" style="cursor:pointer;">06:00 PM</div>
            </div>
            <button class="button">Proceed to Payment</button>
        </div>
    </div>
