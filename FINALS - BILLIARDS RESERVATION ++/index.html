<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borgz - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; background: #0a0a0b;">
    <div class="panel" style="width: 350px; text-align: center; border-color: var(--accent-green);">
        <h1 style="color: var(--accent-green); margin-bottom: 20px;">BORGZ</h1>
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 12px; color: var(--text-muted);">Username</label>
            <input type="text" style="width: 100%; padding: 10px; background: #121214; border: 1px solid #27272a; color: white; border-radius: 5px; margin-top: 5px;">
        </div>
        <div style="text-align: left; margin-bottom: 25px;">
            <label style="font-size: 12px; color: var(--text-muted);">Password</label>
            <input type="password" style="width: 100%; padding: 10px; background: #121214; border: 1px solid #27272a; color: white; border-radius: 5px; margin-top: 5px;">
        </div>
        <button class="button" style="width: 100%; margin: 0;" onclick="location.href='genview.html'">Login</button>
        <p style="margin-top: 20px; font-size: 13px; color: var(--text-muted);">Don't have an account? <span style="color: var(--accent-green); cursor: pointer;">Sign Up</span></p>
    </div>
</body>
</html>
